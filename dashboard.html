<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>MedRemind IoT — ESP32 Smart Medication Reminder & Dispensing Device</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/tabler-icons/3.19.0/webfont/tabler-icons.min.css">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f0f6ff;--surface:#ffffff;--surface2:#f8faff;--surface3:#eef4ff;
  --border:#dde6f5;--text:#0f1f3d;--text2:#5470a0;--text3:#9eb3d0;
  --blue:#2563eb;--blue-l:#dbeafe;--blue-d:#1d4ed8;
  --green:#16a34a;--green-l:#dcfce7;--green-d:#166534;
  --amber:#d97706;--amber-l:#fef3c7;
  --red:#dc2626;--red-l:#fee2e2;
  --purple:#7c3aed;--purple-l:#ede9fe;
  --teal:#0d9488;--teal-l:#ccfbf1;
  --cyan:#0891b2;--cyan-l:#cffafe;
  --radius:12px;--radius-sm:7px;
  --shadow:0 1px 4px rgba(37,99,235,.07),0 4px 16px rgba(37,99,235,.06);
  --shadow-sm:0 1px 3px rgba(0,0,0,.07);
}
[data-theme="dark"]{
  --bg:#08112a;--surface:#0f1f3d;--surface2:#0a1528;--surface3:#0d1a33;
  --border:#1e3155;--text:#e2ecff;--text2:#7b9fd4;--text3:#3d5a8a;
  --blue-l:#1a3468;--green-l:#14532d;--amber-l:#6b3100;--red-l:#4c0a0a;--purple-l:#2e1a6e;--teal-l:#0f3833;--cyan-l:#0c3340;
  --shadow:0 1px 4px rgba(0,0,0,.3);
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--text);font-size:14px;line-height:1.5;min-height:100vh}
.layout{display:flex;min-height:100vh}
.sidebar{width:236px;background:var(--surface);border-right:1px solid var(--border);flex-shrink:0;display:flex;flex-direction:column;box-shadow:var(--shadow)}
.main{flex:1;overflow:hidden;display:flex;flex-direction:column;min-width:0}
/* Sidebar */
.logo{padding:18px 20px 16px;display:flex;align-items:center;gap:12px;border-bottom:1px solid var(--border)}
.logo-icon{width:38px;height:38px;background:linear-gradient(135deg,var(--blue),#60a5fa);border-radius:10px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:20px;box-shadow:0 2px 8px rgba(37,99,235,.3);flex-shrink:0}
.logo-name{font-weight:700;font-size:15px;color:var(--text);letter-spacing:-.3px}
.logo-sub{font-size:10px;color:var(--text2);font-weight:500;letter-spacing:.3px;text-transform:uppercase}
.nav-section{padding:10px 0 2px}
.nav-label{font-size:10px;font-weight:700;color:var(--text3);padding:4px 20px;text-transform:uppercase;letter-spacing:.9px}
.nav-item{display:flex;align-items:center;gap:10px;padding:9px 16px 9px 20px;cursor:pointer;color:var(--text2);transition:all .14s;font-size:13px;font-weight:500;position:relative;margin:1px 8px;border-radius:8px}
.nav-item:hover{background:var(--surface3);color:var(--text)}
.nav-item.active{background:var(--blue-l);color:var(--blue);font-weight:600}
.nav-item.active::before{content:'';position:absolute;left:-8px;top:6px;bottom:6px;width:3px;background:var(--blue);border-radius:0 3px 3px 0}
.nav-item i{font-size:18px;width:20px;text-align:center}
.badge{background:var(--red);color:#fff;font-size:10px;font-weight:700;padding:1px 6px;border-radius:10px;margin-left:auto;min-width:18px;text-align:center}
.badge.green{background:var(--green)}.badge.amber{background:var(--amber)}
.sidebar-footer{padding:14px 16px;border-top:1px solid var(--border);margin-top:auto}
.patient-card{background:var(--surface3);border:1px solid var(--border);border-radius:10px;padding:10px 12px;margin-bottom:10px}
.patient-avatar{width:28px;height:28px;background:linear-gradient(135deg,var(--blue),var(--purple));border-radius:50%;display:flex;align-items:center;justify-content:center;color:#fff;font-size:12px;font-weight:700;flex-shrink:0}
/* Topbar */
.topbar{background:var(--surface);border-bottom:1px solid var(--border);padding:12px 24px;display:flex;align-items:center;gap:12px;flex-shrink:0}
.topbar-title{font-size:17px;font-weight:700;color:var(--text);letter-spacing:-.3px}
.topbar-sub{font-size:11px;color:var(--text2);margin-top:1px}
.spacer{flex:1}
.content{padding:22px 24px;overflow-y:auto;flex:1}
/* Chips & Pills */
.chip{display:inline-flex;align-items:center;gap:5px;padding:5px 11px;border-radius:20px;font-size:12px;font-weight:600;border:none;white-space:nowrap}
.chip.online{background:var(--green-l);color:var(--green)}
.chip.offline{background:var(--red-l);color:var(--red)}
.chip.warning{background:var(--amber-l);color:var(--amber)}
.dot{width:7px;height:7px;border-radius:50%;background:currentColor}
.dot.pulse{animation:pulse-dot 1.5s infinite}
@keyframes pulse-dot{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(.7)}}
.pill{display:inline-flex;align-items:center;gap:4px;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:600;white-space:nowrap}
.pill.blue{background:var(--blue-l);color:var(--blue)}
.pill.green{background:var(--green-l);color:var(--green)}
.pill.amber{background:var(--amber-l);color:var(--amber)}
.pill.red{background:var(--red-l);color:var(--red)}
.pill.purple{background:var(--purple-l);color:var(--purple)}
.pill.teal{background:var(--teal-l);color:var(--teal)}
.pill.cyan{background:var(--cyan-l);color:var(--cyan)}
/* Buttons */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:8px 15px;border-radius:var(--radius-sm);font-size:13px;font-weight:600;cursor:pointer;border:1px solid var(--border);background:var(--surface);color:var(--text);transition:all .14s;white-space:nowrap;line-height:1}
.btn:hover{background:var(--surface2);border-color:var(--blue);color:var(--blue)}
.btn.primary{background:var(--blue);color:#fff;border-color:var(--blue);box-shadow:0 2px 6px rgba(37,99,235,.25)}
.btn.primary:hover{background:var(--blue-d);border-color:var(--blue-d)}
.btn.success{background:var(--green-l);color:var(--green-d);border-color:var(--green-l)}
.btn.success:hover{background:var(--green);color:#fff}
.btn.danger{background:var(--red-l);color:var(--red);border-color:transparent}
.btn.danger:hover{background:var(--red);color:#fff}
.btn.amber{background:var(--amber-l);color:var(--amber);border-color:transparent}
.btn.sm{padding:5px 10px;font-size:12px;border-radius:6px}
.btn.xs{padding:3px 8px;font-size:11px;border-radius:5px}
.btn i{font-size:15px}.btn.sm i{font-size:13px}
/* Cards */
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:18px;box-shadow:var(--shadow-sm)}
.card-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.section-title{font-size:14px;font-weight:700;color:var(--text);display:flex;align-items:center;gap:8px}
.section-title i{color:var(--blue)}
/* Metric Cards */
.metric-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px 18px;box-shadow:var(--shadow-sm);position:relative;overflow:hidden}
.metric-card::after{content:'';position:absolute;top:0;left:0;right:0;height:3px;border-radius:var(--radius) var(--radius) 0 0;background:var(--accent-color,var(--blue))}
.metric-icon{width:38px;height:38px;border-radius:10px;display:flex;align-items:center;justify-content:center;margin-bottom:10px;font-size:20px;flex-shrink:0}
.metric-label{font-size:11px;color:var(--text2);margin-bottom:3px;font-weight:600;text-transform:uppercase;letter-spacing:.5px}
.metric-value{font-size:28px;font-weight:800;color:var(--text);line-height:1;letter-spacing:-.5px}
.metric-sub{font-size:11px;color:var(--text3);margin-top:4px;font-weight:500}
/* Grids */
.grid-2{display:grid;grid-template-columns:repeat(2,1fr);gap:14px}
.grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
.grid-4{display:grid;grid-template-columns:repeat(4,1fr);gap:14px}
.grid-auto{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:14px}
.mb-4{margin-bottom:14px}.mb-6{margin-bottom:20px}
.row{display:flex;align-items:stretch;gap:14px;margin-bottom:14px}
.row .card{flex:1;min-width:0}
/* Table */
table{width:100%;border-collapse:collapse;font-size:13px}
th{text-align:left;padding:9px 12px;font-size:10px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.5px;border-bottom:2px solid var(--border);white-space:nowrap}
td{padding:10px 12px;border-bottom:1px solid var(--border);color:var(--text);vertical-align:middle}
tr:last-child td{border-bottom:none}
tbody tr:hover td{background:var(--surface3)}
/* Forms */
.form-label{font-size:12px;font-weight:600;color:var(--text2);margin-bottom:5px}
.form-group{margin-bottom:12px}
input[type=text],input[type=date],input[type=time],input[type=number],select,textarea{padding:8px 11px;border:1.5px solid var(--border);border-radius:var(--radius-sm);font-size:13px;background:var(--surface);color:var(--text);width:100%;transition:border-color .14s;font-family:inherit}
input:focus,select:focus,textarea:focus{outline:none;border-color:var(--blue);box-shadow:0 0 0 3px rgba(37,99,235,.08)}
.form-row-2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
/* Modal */
.modal-overlay{position:fixed;inset:0;background:rgba(15,31,61,.45);display:flex;align-items:center;justify-content:center;z-index:200;backdrop-filter:blur(2px)}
.modal{background:var(--surface);border-radius:var(--radius);padding:26px;width:520px;max-width:96vw;max-height:90vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.18);border:1px solid var(--border)}
.modal-title{font-size:16px;font-weight:700;margin-bottom:18px;display:flex;align-items:center;justify-content:space-between;color:var(--text)}
/* Progress */
.progress-bar{background:var(--border);border-radius:10px;height:8px;overflow:hidden}
.progress-fill{height:100%;border-radius:10px;transition:width .4s ease}
.progress-bar.thin{height:5px}.progress-bar.thick{height:12px}
/* Device rows */
.device-row{display:flex;align-items:center;justify-content:space-between;padding:11px 0;border-bottom:1px solid var(--border)}
.device-row:last-child{border-bottom:none}
.device-icon{width:34px;height:34px;border-radius:8px;background:var(--surface2);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;color:var(--text2);font-size:17px;flex-shrink:0}
/* Alarm cards */
.alarm-card{border-radius:var(--radius);padding:15px;margin-bottom:10px;display:flex;align-items:center;gap:13px;border-left:4px solid}
.alarm-card.active{background:var(--red-l);border-left-color:var(--red)}
.alarm-card.upcoming{background:var(--amber-l);border-left-color:var(--amber)}
.alarm-card.scheduled{background:var(--blue-l);border-left-color:var(--blue)}
.alarm-card.ok{background:var(--green-l);border-left-color:var(--green)}
.alarm-icon{width:42px;height:42px;border-radius:9px;display:flex;align-items:center;justify-content:center;color:#fff;flex-shrink:0;font-size:20px}
/* Notifications */
.notif-item{padding:13px;border-bottom:1px solid var(--border);display:flex;gap:11px;cursor:pointer;transition:background .12s}
.notif-item:hover{background:var(--surface3)}
.notif-item.unread{background:var(--surface3)}
.notif-icon{width:36px;height:36px;border-radius:9px;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:17px}
.unread-dot{width:8px;height:8px;border-radius:50%;background:var(--blue);flex-shrink:0;margin-top:5px}
/* Toggle */
.toggle{position:relative;display:inline-block;width:40px;height:22px;flex-shrink:0}
.toggle input{display:none}
.toggle-slider{position:absolute;inset:0;background:var(--border);border-radius:11px;cursor:pointer;transition:.2s}
.toggle input:checked+.toggle-slider{background:var(--blue)}
.toggle-slider::after{content:'';position:absolute;width:16px;height:16px;background:#fff;border-radius:50%;top:3px;left:3px;transition:.2s;box-shadow:0 1px 3px rgba(0,0,0,.2)}
.toggle input:checked+.toggle-slider::after{transform:translateX(18px)}
/* Tabs */
.tab-bar{display:flex;gap:2px;border-bottom:2px solid var(--border);margin-bottom:18px;overflow-x:auto}
.tab{padding:9px 16px;font-size:13px;font-weight:600;color:var(--text2);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-2px;transition:all .14s;white-space:nowrap}
.tab.active{color:var(--blue);border-bottom-color:var(--blue)}
.tab:hover:not(.active){color:var(--text);background:var(--surface3);border-radius:6px 6px 0 0}
/* Servo */
.servo-box{background:var(--surface2);border:1.5px solid var(--border);border-radius:var(--radius);padding:18px;text-align:center;transition:border-color .14s}
.servo-circle{width:72px;height:72px;border-radius:50%;margin:0 auto 12px;border:3px solid;display:flex;align-items:center;justify-content:center;font-size:26px}
.servo-circle.ok{border-color:var(--green);background:var(--green-l);color:var(--green)}
.servo-circle.warn{border-color:var(--amber);background:var(--amber-l);color:var(--amber)}
.servo-circle.empty{border-color:var(--red);background:var(--red-l);color:var(--red)}
.servo-circle.off{border-color:var(--text3);background:var(--surface3);color:var(--text3)}
/* Timeline */
.timeline-item{display:flex;align-items:flex-start;gap:13px;padding-bottom:18px}
.timeline-item:last-child{padding-bottom:0}
.timeline-dot-wrap{display:flex;flex-direction:column;align-items:center;flex-shrink:0}
.timeline-dot{width:13px;height:13px;border-radius:50%;border:2.5px solid;margin-top:3px;flex-shrink:0}
.timeline-line{width:2px;flex:1;min-height:22px;margin-top:3px;background:var(--border)}
/* Compartment status cards */
.comp-card{border-radius:var(--radius);border:2px solid;padding:16px;text-align:center;transition:all .2s}
.comp-card.full{border-color:var(--green);background:var(--green-l)}
.comp-card.half{border-color:var(--amber);background:var(--amber-l)}
.comp-card.empty{border-color:var(--red);background:var(--red-l)}
.comp-icon{width:56px;height:56px;border-radius:50%;margin:0 auto 10px;display:flex;align-items:center;justify-content:center;font-size:24px}
/* RTC card accent */
.rtc-card{background:linear-gradient(135deg,var(--blue-l),var(--purple-l));border:1.5px solid var(--blue);border-radius:var(--radius);padding:18px}

/* Scrollbar */
::-webkit-scrollbar{width:5px;height:5px}::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:10px}
::-webkit-scrollbar-thumb:hover{background:var(--text3)}
@keyframes fadeSlide{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.content>*{animation:fadeSlide .22s ease}
</style>
</head>
<body>
<div class="layout" id="app">

<!-- SIDEBAR -->
<div class="sidebar">
  <div class="logo">
    <div class="logo-icon"><i class="ti ti-pill"></i></div>
    <div>
      <div class="logo-name">MedRemind</div>
      <div class="logo-sub">ESP32 IoT Device</div>
    </div>
  </div>

  <div class="nav-section">
    <div class="nav-label">Main</div>
    <div class="nav-item active" data-page="overview"><i class="ti ti-layout-dashboard"></i>Overview</div>
    <div class="nav-item" data-page="meds"><i class="ti ti-pill"></i>Medications<span class="badge amber">3</span></div>
    <div class="nav-item" data-page="reminders"><i class="ti ti-bell"></i>Reminders<span class="badge">2</span></div>
    <div class="nav-item" data-page="dispense"><i class="ti ti-settings-automation"></i>Dispensing</div>
  </div>

  <div class="nav-section">
    <div class="nav-label">Insights</div>
    <div class="nav-item" data-page="analytics"><i class="ti ti-chart-bar"></i>Analytics</div>
    <div class="nav-item" data-page="notifications"><i class="ti ti-notification"></i>Alerts<span class="badge">4</span></div>
  </div>

  <div class="nav-section">
    <div class="nav-label">Device Status</div>
    <div class="nav-item" data-page="device"><i class="ti ti-cpu"></i>Device Status</div>
  </div>

  <div class="sidebar-footer">
    <div class="patient-card">
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:6px">
        <div class="patient-avatar">RS</div>
        <div>
          <div style="font-size:12px;font-weight:700;color:var(--text)">Rahul Sharma</div>
          <div style="font-size:10px;color:var(--text2)">Patient ID: MR-2025-001</div>
        </div>
      </div>
      <div style="display:flex;align-items:center;justify-content:space-between">
        <span style="font-size:10px;color:var(--text2)">3 active medicines</span>
        <span class="pill green" style="font-size:10px">Active</span>
      </div>
    </div>
    <div style="display:flex;align-items:center;justify-content:space-between">
      <span style="font-size:12px;color:var(--text2);font-weight:500">Dark mode</span>
      <label class="toggle"><input type="checkbox" id="darkToggle" onchange="toggleDark()"><div class="toggle-slider"></div></label>
    </div>
  </div>
</div>

<!-- MAIN -->
<div class="main">
  <div class="topbar">
    <div>
      <div class="topbar-title" id="pageTitle">Dashboard Overview</div>
      <div class="topbar-sub" id="pageClock">—</div>
    </div>
    <div class="spacer"></div>
    <div class="chip online" id="esp32Chip"><div class="dot pulse"></div>ESP32 Online</div>
    <div class="chip online" id="rtcChip" style="gap:5px"><div class="dot"></div>RTC Synced</div>
    <button class="btn sm" onclick="refreshAnim()"><i class="ti ti-refresh"></i>Refresh</button>
  </div>
  <div class="content" id="pageContent"></div>
</div>
</div>
<div id="modalContainer"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script>
let darkMode=false, currentPage='overview', charts={};

const meds=[
  {id:1,name:'Metformin',dosage:'500mg',freq:'Twice daily',morning:true,afternoon:false,night:true,start:'2025-01-01',end:'2025-12-31',color:'blue',taken:true},
  {id:2,name:'Lisinopril',dosage:'10mg',freq:'Once daily',morning:true,afternoon:false,night:false,start:'2025-01-01',end:'2025-06-30',color:'purple',taken:false},
  {id:3,name:'Atorvastatin',dosage:'20mg',freq:'Once daily',morning:false,afternoon:false,night:true,start:'2025-01-01',end:'2025-12-31',color:'teal',taken:false},
];

// Compartment status derived from IR sensor readings
const compartments=[
  {slot:'Morning',icon:'ti-sun',irLabel:'IR Sensor 1–2',irStatus:'Medicine Detected',state:'full',statusLabel:'Full',statusIcon:'✅',color:'green',servo:'Servo Motor 1',servoGPIO:'GPIO 18',lastDispense:'Today 07:30 AM',servoState:'ok'},
  {slot:'Afternoon',icon:'ti-sun-high',irLabel:'IR Sensor 3',irStatus:'Low Detection',state:'half',statusLabel:'Half Full',statusIcon:'⚠️',color:'amber',servo:'Servo Motor 2',servoGPIO:'GPIO 19',lastDispense:'Yesterday 1:00 PM',servoState:'warn'},
  {slot:'Night',icon:'ti-moon',irLabel:'IR Sensor 4–5',irStatus:'Not Detected',state:'empty',statusLabel:'Empty',statusIcon:'❌',color:'red',servo:'Servo Motor 3',servoGPIO:'GPIO 21',lastDispense:'Yesterday 10:00 PM',servoState:'empty'},
];

const weekData=[72,85,90,68,95,88,82];
const monthData=[78,82,75,90,85,92,88,76,82,79,85,91,87,83,90,78,84,88,92,85,79,83,87,91,84,78,82,86,90,85];

const notifs=[
  {type:'reminder',icon:'ti-bell-ringing',color:'amber',title:'Lisinopril 10mg due now',body:'Morning dose overdue since 8:00 AM — please take immediately',time:'2 min ago',read:false},
  {type:'missed',icon:'ti-alert-circle',color:'red',title:'Missed dose: Atorvastatin 20mg',body:"Last night's dose was not acknowledged — marked as missed",time:'8 hrs ago',read:false},
  {type:'device',icon:'ti-wifi-off',color:'blue',title:'Device reconnected',body:'ESP32 restored connection after 3-minute outage',time:'2 days ago',read:true},
  {type:'device',icon:'ti-cpu',color:'teal',title:'RTC clock corrected',body:'DS3231 auto-corrected +2 seconds at sync cycle',time:'3 days ago',read:true},
];

const scheduleToday=[
  {time:'07:30 AM',med:'Metformin',dose:'500mg',slot:'Morning',status:'taken'},
  {time:'08:00 AM',med:'Lisinopril',dose:'10mg',slot:'Morning',status:'missed'},
  {time:'08:00 PM',med:'Metformin',dose:'500mg',slot:'Night',status:'upcoming'},
  {time:'10:00 PM',med:'Atorvastatin',dose:'20mg',slot:'Night',status:'upcoming'},
];

const reminderLog=[
  {time:'07:30 AM',med:'Metformin 500mg',action:'Dose Taken',via:'Button 1',status:'taken'},
  {time:'08:00 AM',med:'Lisinopril 10mg',action:'Snoozed ×2 then missed',via:'Button 2',status:'missed'},
  {time:'Yesterday 10PM',med:'Atorvastatin 20mg',action:'Acknowledged',via:'Button 1',status:'taken'},
  {time:'Yesterday 8PM',med:'Metformin 500mg',action:'Dose Taken',via:'Auto',status:'taken'},
];

/* Clock */
function pad(n){return n<10?'0'+n:n}
function updateClock(){
  const now=new Date();
  const days=['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  const months=['January','February','March','April','May','June','July','August','September','October','November','December'];
  const ampm=now.getHours()>=12?'PM':'AM';
  const h=now.getHours()%12||12;
  document.getElementById('pageClock').textContent=`${days[now.getDay()]}, ${now.getDate()} ${months[now.getMonth()]} ${now.getFullYear()} — ${pad(h)}:${pad(now.getMinutes())}:${pad(now.getSeconds())} ${ampm}`;

function updateMed(id){
  const m=meds.find(x=>x.id===id);
  if(!m)return;
  m.name=document.getElementById('mName').value||m.name;
  m.dosage=document.getElementById('mDose').value||m.dosage;
  m.morning=document.getElementById('mMorn').checked;
  m.afternoon=document.getElementById('mAft').checked;
  m.night=document.getElementById('mNight').checked;
  m.start=document.getElementById('mStart').value||m.start;
  m.end=document.getElementById('mEnd').value||m.end;
  closeModal();render();
}

function closeModal(){document.getElementById('modalContainer').innerHTML='';}

function deleteMed(id){
  if(confirm('Delete this medicine and all its reminders?')){
    const i=meds.findIndex(m=>m.id===id);
    if(i>-1){meds.splice(i,1);render();}
  }
}

function saveMed(){
  const n=document.getElementById('mName').value.trim();
  if(!n){alert('Please enter a medicine name.');return;}
  meds.push({
    id:Date.now(),name:n,dosage:document.getElementById('mDose').value,
    freq:document.getElementById('mFreq').value,
    morning:document.getElementById('mMorn').checked,
    afternoon:document.getElementById('mAft').checked,
    night:document.getElementById('mNight').checked,
    start:document.getElementById('mStart').value,
    end:document.getElementById('mEnd').value,
    color:'blue',taken:false
  });
  closeModal();render();
}

function ackDose(){
  const toast=document.createElement('div');
  toast.style.cssText='position:fixed;bottom:24px;right:24px;background:#16a34a;color:#fff;padding:12px 18px;border-radius:10px;font-weight:600;font-size:13px;z-index:999;box-shadow:0 4px 12px rgba(0,0,0,.2);display:flex;align-items:center;gap:8px';
  toast.innerHTML='<i class="ti ti-check" style="font-size:18px"></i> Dose acknowledged! Servo motor dispensing...';
  document.body.appendChild(toast);
  setTimeout(()=>toast.remove(),3200);
}

function snoozeDose(){
  const toast=document.createElement('div');
  toast.style.cssText='position:fixed;bottom:24px;right:24px;background:var(--amber);color:#fff;padding:12px 18px;border-radius:10px;font-weight:600;font-size:13px;z-index:999;box-shadow:0 4px 12px rgba(0,0,0,.2);display:flex;align-items:center;gap:8px';
  toast.innerHTML='<i class="ti ti-clock" style="font-size:18px"></i> Reminder snoozed for 10 minutes';
  document.body.appendChild(toast);
  setTimeout(()=>toast.remove(),2800);
}

function dispense(slot){
  const comp=compartments.find(c=>c.slot===slot);
  if(comp && comp.state==='empty'){alert('Compartment is empty! Refill required.');return;}
  const toast=document.createElement('div');
  toast.style.cssText='position:fixed;bottom:24px;right:24px;background:var(--blue);color:#fff;padding:12px 18px;border-radius:10px;font-weight:600;font-size:13px;z-index:999;box-shadow:0 4px 12px rgba(0,0,0,.2);display:flex;align-items:center;gap:8px';
  const servoNum=slot==='Morning'?1:slot==='Afternoon'?2:3;
  toast.innerHTML=`<i class="ti ti-settings-automation" style="font-size:18px"></i> ${slot} Compartment — Servo Motor ${servoNum} activated!`;
  document.body.appendChild(toast);
  setTimeout(()=>toast.remove(),3000);
}

function markAllRead(){notifs.forEach(n=>n.read=true);render();}
function markRead(i){notifs[i].read=true;render();}

render();
</script>
</body>
